    // ============================================================

    function buildChart(canvasId, seriesData, colors, yPrefix, ySuffix) {
      const ctx = document.getElementById(canvasId);
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: seriesData.dates,
          datasets: [
            {
              label: '实际值',
              data: seriesData.actual,
              borderColor: colors.actual,
              backgroundColor: colors.actual,
              borderWidth: 2.5,
              pointRadius: (ctx) => seriesData.actual[ctx.dataIndex] !== null ? 4 : 0,
              pointBackgroundColor: colors.actual,
              tension: 0.3,
              spanGaps: true
            },
            {
              label: '预测值',
              data: seriesData.predicted,
              borderColor: colors.predicted,
              backgroundColor: colors.predicted,
              borderWidth: 2.5,
              borderDash: [6, 4],
              pointRadius: (ctx) => seriesData.predicted[ctx.dataIndex] !== null ? 5 : 0,
              pointBackgroundColor: colors.predicted,
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              tension: 0.3,
              spanGaps: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'top',
              labels: {
                font: { family: "'PingFang SC','Microsoft YaHei',sans-serif", size: 12 },
                usePointStyle: true, padding: 16
              }
            },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.85)',
              titleFont: { family: "'PingFang SC','Microsoft YaHei',sans-serif" },
              bodyFont: { family: "'PingFang SC','Microsoft YaHei',sans-serif" },
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: (c) => c.dataset.label + ': ' + yPrefix + c.parsed.y.toLocaleString() + ySuffix
              }
            },
            annotation: {
              annotations: {
                divider: {
                  type: 'line',
                  xMin: 10.5, xMax: 10.5,
                  borderColor: 'rgba(0,0,0,0.15)',
                  borderWidth: 1.5,
                  borderDash: [6, 4],
                  label: {
                    display: true,
                    content: '预测 \u2192',
                    position: 'start',
                    backgroundColor: 'rgba(0,0,0,0.5)',
                    color: '#fff',
                    font: { family: "'PingFang SC','Microsoft YaHei',sans-serif", size: 10 },
                    padding: 3
                  }
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 } }
            },
            y: {
              beginAtZero: false,
              ticks: {
                callback: v => yPrefix + v.toLocaleString() + ySuffix,
                font: { size: 11 }
              },
              grid: { color: 'rgba(0,0,0,0.04)' }
            }
          }
        }
      });
    }

    function renderTable() {
      const table = document.getElementById('forecastTable');
      const confBadge = (v) => {
        if (v >= 1) return `<span class="badge badge-100">${(v*100).toFixed(0)}%</span>`;
        if (v >= 0.65) return `<span class="badge badge-high">${(v*100).toFixed(0)}%</span>`;
        if (v >= 0.60) return `<span class="badge badge-mid">${(v*100).toFixed(0)}%</span>`;
        return `<span class="badge badge-low">${(v*100).toFixed(0)}%</span>`;
      };
      const factors = (obj) => Object.entries(obj).map(([k,v]) => `<span style="color:#90A4AE;">${k}:</span> ${v}`).join('<br>');

      let html = `<thead><tr>
        <th>日期</th>
        <th>LME ($/t)</th>
        <th>沪铝 (元/t)</th>
        <th>置信度</th>
        <th>置信度因子</th>
        <th>驱动因素</th>
      </tr></thead><tbody>`;

      DATA.daily_forecast.forEach(d => {
        const rc = d.is_actual ? ' class="actual-row"' : '';
        const lmeActual = d.lme.actual !== null
          ? `<div class="val val-lme">${d.lme.actual.toLocaleString()}</div><div class="sub">实际收盘</div>`
          : '';
        const lmePred = d.lme.actual !== null
          ? `<div class="sub" style="margin-top:4px;">预测: ${d.lme.predicted.toLocaleString()}</div>`
          : `<div class="val val-lme">${d.lme.predicted.toLocaleString()}</div><div class="sub">${d.lme.low.toLocaleString()} - ${d.lme.high.toLocaleString()}</div>`;

        const shfeActual = d.shfe.actual !== null
          ? `<div class="val val-shfe">${d.shfe.actual.toLocaleString()}</div><div class="sub">SMM现货</div>`
          : '';
        const shfePred = d.shfe.actual !== null
          ? `<div class="sub" style="margin-top:4px;">预测: ${d.shfe.predicted.toLocaleString()}</div>`
          : `<div class="val val-shfe">${d.shfe.predicted.toLocaleString()}</div><div class="sub">${d.shfe.low.toLocaleString()} - ${d.shfe.high.toLocaleString()}</div>`;

        html += `<tr${rc}>
          <td>${d.date.slice(5)}<br><span class="sub">${d.weekday}</span></td>
          <td>${lmeActual}${lmePred}</td>
          <td>${shfeActual}${shfePred}</td>
          <td>${confBadge(d.confidence)}</td>
          <td style="text-align:left;font-size:11px;line-height:1.6;">${factors(d.confidence_factors)}</td>
          <td class="driver">${d.driver}</td>
        </tr>`;
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    renderTable();

    // ============================================================
    //  RENDER TIMESTAMPS
    // ============================================================
    function fmtTime(date) {
      return date.getFullYear() + '年' + (date.getMonth()+1) + '月' + date.getDate() + '日 '
        + String(date.getHours()).padStart(2,'0') + ':'
        + String(date.getMinutes()).padStart(2,'0') + ':'
        + String(date.getSeconds()).padStart(2,'0');
    }
    const research = new Date(DATA.meta.updated);
    let html = '数据调研时间: ' + fmtTime(research);

    fetch('pull_time.json?' + Date.now())
      .then(r => r.json())
      .then(j => {
        html += '<br>数据拉取时间: ' + j.pull_time;
        document.getElementById('timestamps').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('timestamps').innerHTML = html;
      });
  </script>
</body>
</html>
