    // ============================================================
    //  RENDER CHARTS
    // ============================================================
    function buildChart(canvasId, seriesData, colors, yPrefix, ySuffix) {
      const ctx = document.getElementById(canvasId);
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: seriesData.dates,
          datasets: [
            {
              label: '实际值',
              data: seriesData.actual,
              borderColor: colors.actual,
              backgroundColor: colors.actual,
              borderWidth: 2.5,
              pointRadius: (ctx) => seriesData.actual[ctx.dataIndex] !== null ? 4 : 0,
              pointBackgroundColor: colors.actual,
              tension: 0.3,
              spanGaps: true
            },
            {
              label: '预测值',
              data: seriesData.predicted,
              borderColor: colors.predicted,
              backgroundColor: colors.predicted,
              borderWidth: 2.5,
              borderDash: [6, 4],
              pointRadius: (ctx) => seriesData.predicted[ctx.dataIndex] !== null ? 5 : 0,
              pointBackgroundColor: colors.predicted,
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              tension: 0.3,
              spanGaps: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              position: 'top',
              labels: {
                font: { family: "'PingFang SC','Microsoft YaHei',sans-serif", size: 12 },
                usePointStyle: true, padding: 16
              }
            },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.85)',
              titleFont: { family: "'PingFang SC','Microsoft YaHei',sans-serif" },
              bodyFont: { family: "'PingFang SC','Microsoft YaHei',sans-serif" },
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: (c) => c.dataset.label + ': ' + yPrefix + c.parsed.y.toLocaleString() + ySuffix
              }
            },
            annotation: {
              annotations: {
                divider: {
                  type: 'line',
                  xMin: 10.5, xMax: 10.5,
                  borderColor: 'rgba(0,0,0,0.15)',
                  borderWidth: 1.5,
                  borderDash: [6, 4],
                  label: {
                    display: true,
                    content: '预测 \u2192',
                    position: 'start',
                    backgroundColor: 'rgba(0,0,0,0.5)',
                    color: '#fff',
                    font: { family: "'PingFang SC','Microsoft YaHei',sans-serif", size: 10 },
                    padding: 3
                  }
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 } }
            },
            y: {
              beginAtZero: false,
              ticks: {
                callback: v => yPrefix + v.toLocaleString() + ySuffix,
                font: { size: 11 }
              },
              grid: { color: 'rgba(0,0,0,0.04)' }
            }
          }
        }
      });
    }

    buildChart('lmeChart', DATA.lme,
      { actual: '#1565C0', predicted: '#42A5F5' }, '$', '');

    buildChart('shfeChart', DATA.shfe,
      { actual: '#E65100', predicted: '#FF8A65' }, '', ' 元');

    // ============================================================
    //  RENDER TABLE
    // ============================================================
    function renderTable() {
      const table = document.getElementById('forecastTable');
      const confBadge = (v) => {
        if (v >= 1) return `<span class="badge badge-100">${(v*100).toFixed(0)}%</span>`;
        if (v >= 0.65) return `<span class="badge badge-high">${(v*100).toFixed(0)}%</span>`;
        if (v >= 0.60) return `<span class="badge badge-mid">${(v*100).toFixed(0)}%</span>`;
        return `<span class="badge badge-low">${(v*100).toFixed(0)}%</span>`;
      };
      const factors = (obj) => Object.entries(obj).map(([k,v]) => `<span style="color:#90A4AE;">${k}:</span> ${v}`).join('<br>');

      let html = `<thead><tr>
        <th>日期</th>
        <th>LME ($/t)</th>
        <th>沪铝 (元/t)</th>
        <th>置信度</th>
        <th>置信度因子</th>
        <th>驱动因素</th>
      </tr></thead><tbody>`;

      DATA.daily_forecast.forEach((d, i) => {
        const rc = d.is_actual ? ' class="actual-row"' : '';

        // 计算涨跌箭头
        const prev = i > 0 ? DATA.daily_forecast[i - 1] : null;
        function arrow(cur, prevVal) {
          if (!prev || prevVal === null || cur === null) return '';
          const diff = cur - prevVal;
          const pct = (diff / prevVal * 100).toFixed(1);
          if (diff > 0) return `<span style="color:#E53935;font-size:11px;font-weight:600;"> &#9650; +${pct}%</span>`;
          if (diff < 0) return `<span style="color:#43A047;font-size:11px;font-weight:600;"> &#9660; ${pct}%</span>`;
          return `<span style="color:#9E9E9E;font-size:11px;"> &#9644; 0%</span>`;
        }
        const prevLme = prev ? (prev.lme.actual !== null ? prev.lme.actual : prev.lme.predicted) : null;
        const prevShfe = prev ? (prev.shfe.actual !== null ? prev.shfe.actual : prev.shfe.predicted) : null;
        const curLme = d.lme.actual !== null ? d.lme.actual : d.lme.predicted;
        const curShfe = d.shfe.actual !== null ? d.shfe.actual : d.shfe.predicted;
        const lmeArrow = arrow(curLme, prevLme);
        const shfeArrow = arrow(curShfe, prevShfe);

        const lmeActual = d.lme.actual !== null
          ? `<div class="val val-lme">${d.lme.actual.toLocaleString()}${lmeArrow}</div><div class="sub">实际收盘</div>`
          : '';
        const lmePred = d.lme.actual !== null
          ? `<div class="sub" style="margin-top:4px;">预测: ${d.lme.predicted.toLocaleString()}</div>`
          : `<div class="val val-lme">${d.lme.predicted.toLocaleString()}${lmeArrow}</div><div class="sub">${d.lme.low.toLocaleString()} - ${d.lme.high.toLocaleString()}</div>`;

        const shfeActual = d.shfe.actual !== null
          ? `<div class="val val-shfe">${d.shfe.actual.toLocaleString()}${shfeArrow}</div><div class="sub">SMM现货</div>`
          : '';
        const shfePred = d.shfe.actual !== null
          ? `<div class="sub" style="margin-top:4px;">预测: ${d.shfe.predicted.toLocaleString()}</div>`
          : `<div class="val val-shfe">${d.shfe.predicted.toLocaleString()}${shfeArrow}</div><div class="sub">${d.shfe.low.toLocaleString()} - ${d.shfe.high.toLocaleString()}</div>`;

        html += `<tr${rc}>
          <td>${d.date.slice(5)}<br><span class="sub">${d.weekday}</span></td>
          <td>${lmeActual}${lmePred}</td>
          <td>${shfeActual}${shfePred}</td>
          <td>${confBadge(d.confidence)}</td>
          <td style="text-align:left;font-size:11px;line-height:1.6;">${factors(d.confidence_factors)}</td>
          <td class="driver">${d.driver}</td>
        </tr>`;
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    renderTable();

    // ============================================================
    //  RENDER TIMESTAMPS
    // ============================================================
    function fmtTime(date) {
      return date.getFullYear() + '年' + (date.getMonth()+1) + '月' + date.getDate() + '日 '
        + String(date.getHours()).padStart(2,'0') + ':'
        + String(date.getMinutes()).padStart(2,'0') + ':'
        + String(date.getSeconds()).padStart(2,'0');
    }
    const research = new Date(DATA.meta.updated);
    let html = '数据调研时间: ' + fmtTime(research);

    fetch('pull_time.json?' + Date.now())
      .then(r => r.json())
      .then(j => {
        html += '<br>数据拉取时间: ' + j.pull_time;
        document.getElementById('timestamps').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('timestamps').innerHTML = html;
      });

    // ============================================================
    //  调研更新日志 (GitHub Commits API)
    // ============================================================
    fetch('https://api.github.com/repos/heyqiang/lv/commits?per_page=15&path=index.html')
      .then(r => r.json())
      .then(commits => {
        if (!Array.isArray(commits) || commits.length === 0) {
          document.getElementById('researchLog').innerHTML = '<div style="color:#9E9E9E;font-size:13px;padding:10px;">暂无记录</div>';
          return;
        }
        let h = '<div style="font-size:12px;">';
        commits.forEach(c => {
          const d = new Date(c.commit.author.date);
          const t = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
          const msg = c.commit.message.split('\n')[0];
          const sha = c.sha.slice(0,7);
          const isResearch = /更新|update|调研/i.test(msg);
          h += '<div style="padding:8px 10px;border-bottom:1px solid #F0F0F0;display:flex;align-items:flex-start;gap:10px;">';
          h += '<div style="flex-shrink:0;width:6px;height:6px;border-radius:50%;margin-top:6px;background:'+(isResearch?'#1565C0':'#BDBDBD')+'"></div>';
          h += '<div style="flex:1;min-width:0;">';
          h += '<div style="color:#212121;word-break:break-word;">'+msg+'</div>';
          h += '<div style="color:#9E9E9E;font-size:11px;margin-top:2px;">'+t+' &middot; <a href="https://github.com/heyqiang/lv/commit/'+c.sha+'" target="_blank" style="color:#90CAF9;text-decoration:none;">'+sha+'</a></div>';
          h += '</div></div>';
        });
        h += '</div>';
        document.getElementById('researchLog').innerHTML = h;
      })
      .catch(() => {
        document.getElementById('researchLog').innerHTML = '<div style="color:#9E9E9E;font-size:13px;padding:10px;">加载失败</div>';
      });

    // ============================================================
    //  服务器同步日志 (sync_log.txt)
    // ============================================================
    fetch('sync_log.txt?' + Date.now())
      .then(r => { if(!r.ok) throw ''; return r.text(); })
      .then(txt => {
        const lines = txt.trim().split('\n').filter(l => l.trim()).reverse();
        if (lines.length === 0) {
          document.getElementById('pullLog').innerHTML = '<div style="color:#9E9E9E;font-size:13px;padding:10px;">暂无记录</div>';
          return;
        }
        let h = '<div style="font-size:12px;">';
        lines.forEach(line => {
          const parts = line.split(' | ');
          const time = parts[0] || '';
          const info = parts.slice(1).join(' | ') || 'git pull';
          const ok = /up-to-date|complete|success|ok/i.test(info) || !/error|fail/i.test(info);
          h += '<div style="padding:8px 10px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:10px;">';
          h += '<div style="flex-shrink:0;width:6px;height:6px;border-radius:50%;background:'+(ok?'#4CAF50':'#F44336')+'"></div>';
          h += '<div style="flex:1;"><span style="color:#212121;">'+time+'</span> <span style="color:#9E9E9E;font-size:11px;margin-left:6px;">'+info+'</span></div>';
          h += '</div>';
        });
        h += '</div>';
        document.getElementById('pullLog').innerHTML = h;
      })
      .catch(() => {
        document.getElementById('pullLog').innerHTML = '<div style="color:#9E9E9E;font-size:13px;padding:10px;">暂无同步日志</div>';
      });
  </script>
